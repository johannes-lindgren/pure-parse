name: Code Integration Checks
on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  integration-checks:
    runs-on: ubuntu-latest
    name: Code Inspection
    steps:
      - name: Check out
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Check Formatting
        run: pnpm exec turbo run check:formatting
      - name: Check Circular Dependencies
        run: pnpm exec turbo run check:circular-dependencies
      - name: Check Types
        run: pnpm exec turbo run check:types
      - name: Test
        run: pnpm exec turbo run test
