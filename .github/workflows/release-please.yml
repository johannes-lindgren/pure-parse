name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release-as:
        description: 'Force a release bump: patch, minor, major, or an exact version (e.g. 1.2.3)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ inputs.release-as }}
